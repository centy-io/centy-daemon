[package]
name = "centy-daemon"
version = "0.8.1"
edition = "2021"
description = "A file-based database engine that stores structured data as Markdown files with YAML frontmatter, exposed via gRPC"
authors = ["Centy Team"]
license = "LicenseRef-PolyForm-Noncommercial-1.0.0"

[dependencies]
# Git worktree workspace management
worktree-io = "0.15.0"

# Storage engine
mdstore = "1.0.0"

# gRPC
tonic = "0.12"
tonic-reflection = "0.12"
tonic-web = "0.12"
prost = "0.13"

# HTTP/CORS/Tower
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
http = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Frontmatter parsing
gray_matter = "0.3"

# Cryptography (for SHA-256)
sha2 = "0.10"
hex = "0.4"

# Date/time
chrono = { version = "0.4", features = ["serde"] }
humantime = "2"

# File system utilities
walkdir = "2"
replace-homedir = "0.1"

# Error handling
thiserror = "1"
anyhow = "1"
color-eyre = "0.6"
tracing-error = "0.2"

# TOML parsing (for user config)
toml = "0.8"

# Template engine
handlebars = "6"

# UUID generation
uuid = { version = "1", features = ["v4"] }

# Semantic versioning
semver = { version = "1", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
    "env-filter",
    "json",
    "fmt",
] }
tracing-appender = "0.2"

# Home directory detection
dirs = "5"

# Async traits and lazy statics
async-trait = "0.1"
once_cell = "1"

# Regex for validation
regex = "1"

# Async utilities
futures = "0.3"

# CLI argument parsing
clap = { version = "4", features = ["derive", "env"] }

# Command existence checking
which = "6"

# Shell escaping for command construction
shell-escape = "0.1"
slug = "0.1.6"


[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
tempfile = "3"
cargo-husky = { version = "1", default-features = false, features = [
    "precommit-hook",
    "prepush-hook",
    "user-hooks",
] }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
# Enable pedantic lints
pedantic = { level = "warn", priority = -1 }

# Deny panic/unwrap/expect to enforce proper error handling
# These lints prevent runtime panics in favor of explicit error handling
# Test code is exempted via cfg_attr(test, allow(...)) in lib.rs and main.rs
panic = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic_in_result_fn = "deny"
unwrap_in_result = "deny"
exit = "deny"

# Deny unvalidated arithmetic to prevent overflow panics in debug
# and silent wrapping in release builds
arithmetic_side_effects = "deny"

# Deny direct indexing/slicing to prevent index-out-of-bounds panics
# Use safe alternatives like .get(), .first(), .split_at() which return Option
indexing_slicing = "deny"
# Deny string slicing to prevent panics on non-UTF-8 character boundaries
string_slice = "deny"

# Warn on long functions - enforces refactoring into smaller functions
too_many_lines = "deny"

# Prefer map_or/map_or_else/is_some_and/is_none_or over map().unwrap_or()
map_unwrap_or = "deny"

# Allow noisy pedantic lints
missing_errors_doc = "allow"
