version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/centy-io/centy-daemon/mcp/gen
plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go@latest
    out: mcp/gen
    opt:
      - paths=source_relative
  - local:
      - go
      - run
      - connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
    out: mcp/gen
    opt:
      - paths=source_relative
  - local:
      - go
      - run
      - github.com/redpanda-data/protoc-gen-go-mcp/cmd/protoc-gen-go-mcp@latest
    out: mcp/gen
    opt:
      - paths=source_relative
