name: MCP Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.9.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build MCP binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: mcp/go.sum

      - name: Generate
        run: make generate

      - name: Build binaries
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          cd mcp
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o ../centy-mcp-linux-x86_64   .
          GOOS=linux   GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" -o ../centy-mcp-linux-aarch64  .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o ../centy-mcp-darwin-x86_64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" -o ../centy-mcp-darwin-aarch64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o ../centy-mcp-windows-x86_64.exe .

      - name: Upload to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            centy-mcp-linux-x86_64
            centy-mcp-linux-aarch64
            centy-mcp-darwin-x86_64
            centy-mcp-darwin-aarch64
            centy-mcp-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "${VERSION}" --no-git-tag-version
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
        working-directory: mcp/npm

      - name: Check if version already published
        id: npm_check
        run: |
          if npm view "centy-mcp@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} already on npm, skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.npm_check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        working-directory: mcp/npm
